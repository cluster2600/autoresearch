specVersion: v2
specMinorVersion: 2
meta:
  name: autoresearch
  image: project-autoresearch
  description: "AI agents running autonomous LLM research on single-GPU nanochat training"
  createdOn: "2026-03-19T00:00:00Z"
  defaultBranch: master
layout:
- path: .project/
  type: code
  storage: git
- path: code/
  type: code
  storage: git
- path: models/
  type: models
  storage: gitlfs
- path: data/
  type: data
  storage: gitignore
- path: data/scratch/
  type: data
  storage: gitignore
environment:
  base:
    registry: nvcr.io
    image: nvidia/pytorch:24.12-py3
    name: PyTorch
    description: "NVIDIA PyTorch container with CUDA support"
    os: linux
    os_distro: ubuntu
    os_distro_release: "22.04"
execution:
  apps:
  - name: jupyterlab
    type: jupyterlab
    class: webapp
    startCommand: jupyter lab --allow-root --port 8888 --ip 0.0.0.0 --no-browser --NotebookApp.base_url=\$PROXY_PREFIX --NotebookApp.default_url=/lab --NotebookApp.allow_origin='*'
    healthCheckCommand: "[ \\$(echo url=\\$(jupyter lab list | head -n 2 | tail -n 1 | cut -f1 -d' ' | grep -v 'Currently' | sed \"s@/?@/lab?@g\") | curl -o /dev/null -s -w '%{http_code}' --config -) == '200' ]"
    webapp:
      autolaunch: true
      port: 8888
  resources:
    gpu:
      requested: 1
    sharedMemoryMB: 4096
  mounts:
  - type: project
    target: /project/
    description: Project root
    options: ""
