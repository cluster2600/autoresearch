specVersion: v2
specMinorVersion: 2
meta:
  name: autoresearch
  image: project-autoresearch
  description: AI agents running autonomous LLM research on single-GPU nanochat training
  createdOn: "2026-03-19T00:00:00Z"
  defaultBranch: master
layout:
- path: .project/
  type: code
  storage: git
- path: code/
  type: code
  storage: git
- path: models/
  type: models
  storage: gitlfs
- path: data/
  type: data
  storage: gitignore
- path: data/scratch/
  type: data
  storage: gitignore
environment:
  base:
    registry: nvcr.io
    image: nvidia/pytorch:24.12-py3
    name: PyTorch
    description: NVIDIA PyTorch container with CUDA support
    os: linux
    os_distro: ubuntu
    os_distro_release: "22.04"
execution:
  apps: []
  resources:
    gpu:
      requested: 1
    sharedMemoryMB: 4096
  mounts:
  - type: project
    target: /project/
    description: Project root
    options: ""
